[pytest]
# 测试用例发现规则
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试用例搜索路径
testpaths = testcases

# 项目根目录加入sys.path，支持包式导入
pythonpath = .

# 输出格式
addopts = -v --tb=short

# Allure报告配置
# 执行命令: pytest --alluredir=report/allure_raw
# 生成报告: allure generate report/allure_raw -o report/allure_html --clean
