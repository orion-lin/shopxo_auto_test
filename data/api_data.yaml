api_host: "http://shopxo.local"
login_api:
  path: "/user/login"
  type: "username"
  accounts: "qqqqqq"
  pwd: "qqqqqq"
  success_code: 0
  success_msg: "登录成功"
verify_api:
  path: "/user/userverifyentry/type/user_login.html"
login_errors:
  empty_user:
    type: "username"
    accounts: ""
    pwd: "qqqqqq"
    expected_code: -1
    expected_msg: "账号不能为空"
  empty_pwd:
    type: "username"
    accounts: "qqqqqq"
    pwd: ""
    expected_code: -1
    expected_msg: "登录密码格式6~18个字符之间"
  wrong_pwd:
    type: "username"
    accounts: "qqqqqq"
    pwd: "123456"
    expected_code: -4
    expected_msg: "密码错误"
  empty_captcha:
    type: "username"
    accounts: "qqqqqq"
    pwd: "qqqqqq"
    verify: ""
    expected_code: -10
    expected_msg: "图片验证码不能为空"
  wrong_captcha:
    type: "username"
    accounts: "qqqqqq"
    pwd: "qqqqqq"
    verify: "9999"
    expected_code: -12
    expected_msg: "验证码错误"
unauthorized:
  expected_code: -1
  expected_msg: "数据id有误"
cart_api:
  save_path: "/?s=cart/save.html"
  stock_path: "/?s=cart/stock.html"
  delete_path: "/?s=cart/delete.html"
  index_path: "/?s=cart/index.html"
  valid_goods_id: 1
  invalid_goods_id: 999999
  valid_stock: 1
  invalid_stock: 0
  success_code: 0
  success_msg: "加入成功"
  delete_success_msg: "删除成功"
  update_success_msg: "更新成功"
search_api:
  path: "/?s=search/index.html"
  method: "post"
  valid_keyword: "手机"
  no_match_keyword: "xxxxxxxxxx"
  empty_keyword: ""
  success_code: 0
product_api:
  detail_path: "/?s=goods/detail"
  valid_product_id: 1
  invalid_product_id: 999999
  success_code: 0
order_api:
  index_path: "/?s=order/index.html"
  detail_path: "/?s=order/detail/id/{id}.html"
  pay_path: "/?s=order/pay.html"
  cancel_path: "/?s=order/cancel.html"
  buy_path: "/?s=buy/index.html"
  valid_order_id: 1
  invalid_order_id: 999999
  success_code: 0
  success_msg: "提交成功"