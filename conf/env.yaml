
# 环境配置文件
# 被测站点基础配置

# 当前环境：development(开发) / testing(测试) / production(生产)
environment: testing

# 被测站点地址
base_url: http://shopxo.local
# API基础路径（若接口与前端同域，可留空或填/api）
api_path: ""

# 请求超时时间（秒）
request_timeout: 30

# 页面加载超时时间（秒）
page_load_timeout: 30

# 元素等待超时时间（秒）
element_wait_timeout: 10

# 浏览器驱动模式：local(本地指定驱动) / auto(webdriver-manager自动下载)
driver_mode: local

# 本地驱动路径（仅driver_mode为local时生效）
local_driver_path: D:\BcTool\Pycharm\Driver\chromedriver-win64\chromedriver.exe

# 是否开启无头模式（headless）
headless: false

# 是否最大化窗口
maximize_window: true

# 是否启用页面加载策略：normal(正常) / eager(就绪) / none(无)
page_load_strategy: normal
